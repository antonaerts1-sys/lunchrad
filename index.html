<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunch van de Maand — The Kind Kids</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #ffffff;
    color: #000;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px;
    overflow-x: hidden;
  }

  .logo {
    height: 64px;
    margin-bottom: 24px;
  }

  h1 {
    font-size: 52px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 8px;
    color: #000;
    text-align: center;
  }

  .subtitle {
    font-size: 16px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #000;
    margin-bottom: 40px;
    opacity: 0.5;
  }

  .wheel-container {
    position: relative;
    width: 540px;
    height: 540px;
    margin-bottom: 32px;
  }

  canvas#wheel {
    width: 540px;
    height: 540px;
    filter: drop-shadow(0 12px 40px rgba(0, 0, 0, 0.12));
  }

  .pointer {
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    transform-origin: center bottom;
    width: 0;
    height: 0;
    border-left: 20px solid transparent;
    border-right: 20px solid transparent;
    border-top: 40px solid #000;
    z-index: 10;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    transition: transform 0.08s ease-out;
  }

  .center-circle {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 70px;
    height: 70px;
    background: #fff;
    border: 3px solid #000;
    border-radius: 50%;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #000;
  }

  .spin-btn {
    background: #00B800;
    color: #000;
    border: none;
    padding: 16px 56px;
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 16px;
  }

  .spin-btn:hover { background: #00a000; transform: scale(1.03); }
  .spin-btn:active { transform: scale(0.97); }
  .spin-btn:disabled { background: #ddd; color: #999; cursor: not-allowed; transform: none; }

  .reset-btn {
    background: #000;
    color: #fff;
    border: none;
    padding: 12px 36px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 32px;
    display: none;
  }

  .reset-btn:hover { background: #333; }

  .winners-panel {
    background: #00B800;
    border-radius: 24px;
    padding: 32px 36px;
    width: 100%;
    max-width: 540px;
    display: none;
  }

  .winners-panel h2 {
    font-size: 28px;
    font-weight: 900;
    text-transform: uppercase;
    margin-bottom: 20px;
    color: #000;
  }

  .winner-card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 20px;
    background: rgba(0,0,0,0.08);
    border-radius: 16px;
    margin-bottom: 10px;
    animation: slideIn 0.5s ease;
  }

  .winner-card:last-child { margin-bottom: 0; }

  .winner-number {
    font-size: 12px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #000;
    opacity: 0.5;
    min-width: 90px;
  }

  .winner-name {
    font-size: 22px;
    font-weight: 900;
    text-transform: uppercase;
    color: #000;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== FULLSCREEN WINNER OVERLAY ===== */
  .winner-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 60;
    pointer-events: none;
    opacity: 0;
  }

  .winner-overlay.active {
    animation: overlayFadeIn 0.4s ease forwards;
  }

  .winner-overlay.fade-out {
    animation: overlayFadeOut 0.5s ease forwards;
  }

  .winner-overlay .overlay-bg {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #00B800;
  }

  .winner-overlay.orange .overlay-bg {
    background: #FC470F;
  }

  .winner-overlay .overlay-label {
    position: relative;
    font-size: 18px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 6px;
    color: #000;
    opacity: 0.4;
    margin-bottom: 16px;
    animation: revealUp 0.5s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .winner-overlay .overlay-name {
    position: relative;
    font-size: 100px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: -2px;
    color: #000;
    line-height: 1;
    animation: nameBounceIn 0.7s 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  .winner-overlay .overlay-sub {
    position: relative;
    font-size: 18px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #000;
    opacity: 0.35;
    margin-top: 20px;
    animation: revealUp 0.4s 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes overlayFadeIn {
    0% { opacity: 0; }
    100% { opacity: 1; }
  }

  @keyframes overlayFadeOut {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }

  @keyframes nameBounceIn {
    0% { opacity: 0; transform: scale(0.3) translateY(40px); }
    60% { opacity: 1; transform: scale(1.08) translateY(-5px); }
    80% { transform: scale(0.96) translateY(2px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  @keyframes revealUp {
    0% { opacity: 0; transform: translateY(20px); }
    100% { opacity: 0.4; transform: translateY(0); }
  }

  /* ===== FINALE OVERLAY ===== */
  .finale-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .finale-overlay.active {
    opacity: 1;
    pointer-events: auto;
    animation: finaleIn 0.6s ease forwards;
  }

  .finale-overlay .finale-label {
    font-size: 16px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 6px;
    color: #fff;
    opacity: 0;
    margin-bottom: 40px;
    animation: finaleFadeUp 0.6s 0.8s ease both;
  }

  .finale-overlay .finale-names {
    display: flex;
    align-items: center;
    gap: 32px;
  }

  .finale-overlay .finale-name {
    font-size: 72px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: -1px;
    line-height: 1;
    padding: 16px 40px;
    border-radius: 24px;
    opacity: 0;
  }

  .finale-overlay .finale-name:nth-child(1) {
    background: #00B800;
    color: #000;
    animation: flyInLeft 0.8s 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .finale-overlay .finale-amp {
    font-size: 56px;
    font-weight: 900;
    color: #fff;
    opacity: 0;
    animation: ampPop 0.5s 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  .finale-overlay .finale-name:nth-child(3) {
    background: #FC470F;
    color: #000;
    animation: flyInRight 0.8s 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .finale-overlay .finale-sub {
    font-size: 20px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: #fff;
    opacity: 0;
    margin-top: 40px;
    animation: finaleFadeUp 0.6s 1.2s ease both;
  }

  @keyframes finaleIn {
    0% { opacity: 0; }
    100% { opacity: 1; }
  }

  @keyframes flyInLeft {
    0% { opacity: 0; transform: translateX(-120vw) rotate(-8deg); }
    100% { opacity: 1; transform: translateX(0) rotate(0deg); }
  }

  @keyframes flyInRight {
    0% { opacity: 0; transform: translateX(120vw) rotate(8deg); }
    100% { opacity: 1; transform: translateX(0) rotate(0deg); }
  }

  @keyframes ampPop {
    0% { opacity: 0; transform: scale(0); }
    70% { transform: scale(1.3); }
    100% { opacity: 0.35; transform: scale(1); }
  }

  @keyframes finaleFadeUp {
    0% { opacity: 0; transform: translateY(20px); }
    100% { opacity: 0.35; transform: translateY(0); }
  }

  .confetti-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 100;
  }
</style>
</head>
<body>

<img class="logo" src="https://www.thekindkids.be/frontend/img/site/logo.svg" alt="The Kind Kids" />
<h1>Lunch van de Maand</h1>
<div class="subtitle">2 winnaars  /  1 lunch</div>

<div class="wheel-container">
  <div class="pointer" id="pointer"></div>
  <canvas id="wheel" width="1080" height="1080"></canvas>
  <div class="center-circle" id="centerLabel">Spin</div>
  <div class="winner-overlay" id="winnerOverlay">
    <div class="overlay-bg"></div>
    <div class="overlay-label">Winnaar 1</div>
    <div class="overlay-name" id="overlayName"></div>
    <div class="overlay-sub">Nog 1 te gaan</div>
  </div>
</div>

<button class="spin-btn" id="spinBtn" onclick="spin()">Draai het rad</button>
<button class="reset-btn" id="resetBtn" onclick="resetWheel()">Opnieuw</button>

<div class="winners-panel" id="winnersPanel">
  <h2>Winnaars</h2>
  <div id="winnersList"></div>
</div>

<div class="finale-overlay" id="finaleOverlay">
  <div class="finale-label">Lunch van de Maand</div>
  <div class="finale-names">
    <div class="finale-name" id="finaleName1"></div>
    <div class="finale-amp">&</div>
    <div class="finale-name" id="finaleName2"></div>
  </div>
  <div class="finale-sub">Geniet ervan</div>
</div>

<canvas class="confetti-canvas" id="confetti"></canvas>

<script>
const names = [
  "Jan H.", "Leen", "Kristof", "Bram", "Tim",
  "Annelies", "Eva V.", "Kim", "Stephanie", "Eva B.",
  "Karel-Jan", "Hannah", "Anton L.", "Eline", "Lore D.",
  "Laure", "Sarah O.", "Jill", "Merel", "Aurel",
  "Sigrid", "Maridona", "Seppe", "Emily", "Ben",
  "Joanna", "Ashley", "Laurie", "Sarah M.", "Maarten",
  "Charlot", "Emma", "Nils", "Lukas", "David",
  "Pieter Jelle", "Sten", "Daphne", "Anton A.", "Robin",
  "Lore P.", "Rein", "Michael", "Jan B.", "Jonas",
  "Cedric", "Lori"
];

const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;
const cx = W / 2;
const cy = H / 2;
const radius = W / 2 - 20;
const segAngle = (2 * Math.PI) / names.length;

const brandColors = ['#00B800', '#FC470F', '#3391FF', '#E80094'];
const palette = names.map((_, i) => brandColors[i % 4]);

let currentAngle = 0;
let spinning = false;
let winners = [];
let eliminatedIndex = -1;
let flashIndex = -1;
let flashPhase = 0;

// ===== AUDIO: tick sound via Web Audio API =====
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playTick(volume = 0.15) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;

  // Soft wooden "tok" — filtered noise burst
  const bufferSize = audioCtx.sampleRate * 0.03; // 30ms
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    // Noise that decays fast
    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 8);
  }

  const noise = audioCtx.createBufferSource();
  noise.buffer = buffer;

  // Bandpass filter to get a woody tone
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.setValueAtTime(400 + Math.random() * 200, t); // slight variation
  filter.Q.setValueAtTime(2, t);

  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(volume * 0.6, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.035);

  noise.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);
  noise.start(t);
  noise.stop(t + 0.04);
}

// ===== POINTER BOUNCE =====
const pointer = document.getElementById('pointer');
let pointerTimeout = null;
function bouncePointer() {
  pointer.style.transform = 'translateX(-50%) rotate(12deg)';
  clearTimeout(pointerTimeout);
  pointerTimeout = setTimeout(() => {
    pointer.style.transform = 'translateX(-50%) rotate(0deg)';
  }, 80);
}

// ===== DRAWING =====
function drawWheel() {
  ctx.clearRect(0, 0, W, H);

  for (let i = 0; i < names.length; i++) {
    const startAngle = currentAngle + i * segAngle;
    const endAngle = startAngle + segAngle;
    const isEliminated = i === eliminatedIndex;
    const isFlashing = i === flashIndex;

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, radius, startAngle, endAngle);
    ctx.closePath();

    if (isEliminated) {
      ctx.fillStyle = '#e0e0e0';
    } else if (isFlashing) {
      // Flash between white and original color
      ctx.fillStyle = flashPhase % 2 === 0 ? '#fff' : palette[i];
    } else {
      ctx.fillStyle = palette[i];
    }
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, radius, startAngle, endAngle);
    ctx.closePath();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Name text
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(startAngle + segAngle / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = isEliminated ? '#bbb' : '#000';
    ctx.font = `900 ${isEliminated ? 16 : 19}px 'Inter', sans-serif`;
    ctx.fillText(names[i].toUpperCase(), radius - 26, 6);
    ctx.restore();
  }

  // Outer ring
  ctx.beginPath();
  ctx.arc(cx, cy, radius + 4, 0, 2 * Math.PI);
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 6;
  ctx.stroke();
}

function getSelectedIndex() {
  const pointerAngle = -Math.PI / 2;
  let normalizedAngle = (pointerAngle - currentAngle) % (2 * Math.PI);
  if (normalizedAngle < 0) normalizedAngle += 2 * Math.PI;
  return Math.floor(normalizedAngle / segAngle);
}

// ===== FLASH winning segment =====
function flashWinner(idx, callback) {
  flashIndex = idx;
  let count = 0;
  const totalFlashes = 8;

  function doFlash() {
    flashPhase = count;
    drawWheel();
    count++;
    if (count <= totalFlashes) {
      setTimeout(doFlash, 120 + count * 20); // slows down
    } else {
      flashIndex = -1;
      drawWheel();
      setTimeout(callback, 200);
    }
  }
  doFlash();
}

// ===== SPIN with dramatic easing, ticks, pointer bounce =====
function spin() {
  if (spinning) return;
  initAudio();
  spinning = true;
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('centerLabel').textContent = '...';

  // More rotations for more drama (7-11 full rotations)
  const extraRotations = (7 + Math.random() * 4) * 2 * Math.PI;
  const targetAngle = currentAngle + extraRotations;
  const startAngle = currentAngle;
  // Longer duration for more suspense
  const duration = 6000 + Math.random() * 2000;
  const startTime = performance.now();
  let lastSegIndex = getSelectedIndex();

  // Dramatic easing: very slow at end with slight overshoot
  function easeOutExpo(t) {
    if (t >= 1) return 1;
    return 1 - Math.pow(2, -12 * t);
  }

  // Overshoot function: goes slightly past then bounces back
  function easeWithBounce(t) {
    const base = easeOutExpo(t);
    if (t > 0.92) {
      // Bounce zone: overshoot then settle
      const bounceT = (t - 0.92) / 0.08; // 0 to 1 in bounce zone
      const bounce = Math.sin(bounceT * Math.PI * 2.5) * 0.003 * (1 - bounceT);
      return base + bounce;
    }
    return base;
  }

  function animate(time) {
    const elapsed = time - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const eased = easeWithBounce(progress);

    currentAngle = startAngle + (targetAngle - startAngle) * eased;
    drawWheel();

    // Tick detection: did we cross a segment boundary?
    const currentSegIndex = getSelectedIndex();
    if (currentSegIndex !== lastSegIndex) {
      // Volume based on speed (louder when slower = more dramatic)
      const speed = 1 - progress;
      const vol = progress > 0.7 ? 0.25 : 0.1 + speed * 0.1;
      playTick(vol);
      bouncePointer();
      lastSegIndex = currentSegIndex;
    }

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      // Spin complete — flash then reveal
      spinning = false;
      const selectedIdx = getSelectedIndex();

      if (winners.length === 0) {
        // Flash the winning segment first
        flashWinner(selectedIdx, () => {
          winners.push(names[selectedIdx]);
          eliminatedIndex = selectedIdx;
          drawWheel();

          document.getElementById('centerLabel').textContent = '1/2';
          showWinnerOverlay(names[selectedIdx], () => {
            showWinner(1, names[selectedIdx]);
            document.getElementById('spinBtn').disabled = false;
            document.getElementById('spinBtn').textContent = 'Draai voor winnaar 2';
          }, null, 'Winnaar 1', 'Nog 1 te gaan');
        });
      } else if (winners.length === 1) {
        let idx = selectedIdx;
        if (idx === eliminatedIndex) {
          idx = (idx + 1) % names.length;
        }

        flashWinner(idx, () => {
          winners.push(names[idx]);

          document.getElementById('centerLabel').textContent = '2/2';
          showWinnerOverlay(names[idx], () => {
            showWinner(2, names[idx]);
            setTimeout(() => {
              showFinale(winners[0], winners[1]);
            }, 400);
          }, 'orange', 'Winnaar 2', '');
        });
      }
    }
  }

  requestAnimationFrame(animate);
}

// ===== FULLSCREEN WINNER OVERLAY =====
function showWinnerOverlay(name, onDone, colorClass, labelText, subText) {
  const overlay = document.getElementById('winnerOverlay');
  const overlayName = document.getElementById('overlayName');
  const overlayLabel = document.querySelector('.winner-overlay .overlay-label');
  const overlaySub = document.querySelector('.winner-overlay .overlay-sub');

  overlayName.textContent = name.toUpperCase();
  overlayLabel.textContent = labelText || 'Winnaar 1';
  overlaySub.textContent = subText !== undefined ? subText : 'Nog 1 te gaan';
  overlaySub.style.display = subText === '' ? 'none' : 'block';

  // Force re-trigger animations by cloning inner elements
  overlayLabel.style.animation = 'none';
  overlayName.style.animation = 'none';
  overlaySub.style.animation = 'none';
  void overlayLabel.offsetHeight; // reflow
  overlayLabel.style.animation = '';
  overlayName.style.animation = '';
  overlaySub.style.animation = '';

  overlay.classList.remove('orange', 'fade-out');
  if (colorClass) overlay.classList.add(colorClass);
  overlay.style.opacity = '';
  overlay.classList.add('active');

  setTimeout(() => {
    overlay.classList.remove('active');
    overlay.classList.add('fade-out');

    setTimeout(() => {
      overlay.classList.remove('fade-out', 'orange');
      overlay.style.opacity = '0';
      if (onDone) onDone();
    }, 500);
  }, 2800);
}

// ===== FINALE =====
function showFinale(name1, name2) {
  const finale = document.getElementById('finaleOverlay');

  // Reset animations by removing and re-adding class
  finale.classList.remove('active');
  const n1 = document.getElementById('finaleName1');
  const n2 = document.getElementById('finaleName2');
  const amp = document.querySelector('.finale-amp');
  const label = document.querySelector('.finale-label');
  const sub = document.querySelector('.finale-sub');

  // Force animation restart
  [n1, n2, amp, label, sub].forEach(el => {
    el.style.animation = 'none';
    void el.offsetHeight;
    el.style.animation = '';
  });

  n1.textContent = name1.toUpperCase();
  n2.textContent = name2.toUpperCase();
  finale.classList.add('active');
  launchConfetti();

  document.getElementById('spinBtn').style.display = 'none';
  document.getElementById('resetBtn').style.display = 'block';
}

function showWinner(num, name) {
  const panel = document.getElementById('winnersPanel');
  const list = document.getElementById('winnersList');
  panel.style.display = 'block';

  const card = document.createElement('div');
  card.className = 'winner-card';
  card.innerHTML = `
    <span class="winner-number">Winnaar ${num}</span>
    <span class="winner-name">${name.toUpperCase()}</span>
  `;
  list.appendChild(card);
}

function resetWheel() {
  winners = [];
  eliminatedIndex = -1;
  currentAngle = 0;

  document.getElementById('winnersList').innerHTML = '';
  document.getElementById('winnersPanel').style.display = 'none';
  document.getElementById('finaleOverlay').classList.remove('active');
  document.getElementById('spinBtn').style.display = 'block';
  document.getElementById('spinBtn').disabled = false;
  document.getElementById('spinBtn').textContent = 'Draai het rad';
  document.getElementById('resetBtn').style.display = 'none';
  document.getElementById('centerLabel').textContent = 'Spin';
  pointer.style.transform = 'translateX(-50%) rotate(0deg)';

  drawWheel();
}

// ===== CONFETTI =====
function launchConfetti() {
  const cCanvas = document.getElementById('confetti');
  cCanvas.width = window.innerWidth;
  cCanvas.height = window.innerHeight;
  const cCtx = cCanvas.getContext('2d');
  const pieces = [];
  const colors = ['#00B800', '#FC470F', '#3391FF', '#E80094', '#000'];

  for (let i = 0; i < 200; i++) {
    pieces.push({
      x: Math.random() * cCanvas.width,
      y: Math.random() * -cCanvas.height,
      w: 8 + Math.random() * 12,
      h: 4 + Math.random() * 6,
      color: colors[Math.floor(Math.random() * colors.length)],
      speed: 2 + Math.random() * 5,
      angle: Math.random() * Math.PI * 2,
      spin: (Math.random() - 0.5) * 0.2,
      drift: (Math.random() - 0.5) * 2,
      opacity: 1
    });
  }

  let frame = 0;
  function animateConfetti() {
    cCtx.clearRect(0, 0, cCanvas.width, cCanvas.height);
    frame++;

    let alive = false;
    pieces.forEach(p => {
      p.y += p.speed;
      p.x += p.drift;
      p.angle += p.spin;
      if (frame > 140) p.opacity -= 0.012;

      if (p.opacity > 0 && p.y < cCanvas.height + 20) {
        alive = true;
        cCtx.save();
        cCtx.translate(p.x, p.y);
        cCtx.rotate(p.angle);
        cCtx.globalAlpha = Math.max(0, p.opacity);
        cCtx.fillStyle = p.color;
        cCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        cCtx.restore();
      }
    });

    if (alive) requestAnimationFrame(animateConfetti);
  }

  animateConfetti();
}

// Init
drawWheel();
</script>
</body>
</html>
